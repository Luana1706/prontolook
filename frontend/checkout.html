<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento | Pronto Look</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="checkout-body">
    <div class="checkout-container">
        <header class="checkout-header">
            <h2>Finalizar Pagamento</h2>
            <p>Escolha como deseja pagar seu pedido</p>
        </header>

        <a href="carrinho.html" class="checkout-voltar"><i class="fas fa-arrow-left"></i> Voltar ao carrinho</a>

        <div class="payment-options">
            <div class="payment-method" onclick="selectMethod('credito', this)">
                <i class="fas fa-credit-card payment-icon payment-icon-rosa"></i>
                <div class="payment-info">
                    <h4>Cartão de Crédito</h4>
                    <p class="payment-desc">Em até 6x sem juros</p>
                </div>
                <div class="card-icons">
                    <i class="fab fa-cc-visa"></i>
                    <i class="fab fa-cc-mastercard"></i>
                    <i class="fab fa-cc-amex"></i>
                </div>
            </div>

            <div class="payment-method" onclick="selectMethod('debito', this)">
                <i class="fas fa-university payment-icon payment-icon-cinza"></i>
                <div class="payment-info">
                    <h4>Débito Online</h4>
                    <p class="payment-desc">Pagamento à vista</p>
                </div>
                <i class="fas fa-check-circle payment-check"></i>
            </div>

            <div class="payment-method" onclick="selectMethod('pix', this)">
                <i class="fas fa-qrcode payment-icon payment-icon-pix"></i>
                <div class="payment-info">
                    <h4>PIX</h4>
                    <p class="payment-desc">Aprovação imediata (5% de desconto)</p>
                </div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo%E2%80%94_Pix.png" width="40" alt="Pix">
            </div>

            <div id="pix-area" class="pix-qr">
                <p class="pix-titulo">Escaneie o QR Code abaixo:</p>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=PRONTOLOOK-PIX-EXEMPLO" alt="QR Code">
                <p class="pix-chave">Chave: financeiro@prontolook.com.br</p>
            </div>
        </div>

        <div class="checkout-resumo">
            <div class="checkout-linha">
                <span>Subtotal:</span>
                <span id="subtotal">R$ 0,00</span>
            </div>
            <div class="checkout-total">
                <span>Total:</span>
                <span id="total-final">R$ 0,00</span>
            </div>
            <button class="btn-cadastrar" onclick="confirmarPagamento()">CONFIRMAR PAGAMENTO</button>
        </div>
    </div>

    <script>
        function selectMethod(method, element) {
            document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('pix-area').style.display = (method === 'pix') ? 'block' : 'none';
        }

        const totalCarrinho = localStorage.getItem('totalCarrinho') || "0,00";
        document.getElementById('subtotal').innerText = `R$ ${totalCarrinho}`;
        document.getElementById('total-final').innerText = `R$ ${totalCarrinho}`;

        function confirmarPagamento() {
            const metodSelecionado = document.querySelector('.payment-method.active');
            if (!metodSelecionado) {
                alert("Selecione um método de pagamento.");
                return;
            }
            alert("Pedido confirmado! Em breve você receberá a confirmação por e-mail.");
            localStorage.removeItem('totalCarrinho');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
