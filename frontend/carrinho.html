<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho | Pronto Look</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body class="carrinho-body">
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <span class="logo-texto">Pronto <span class="logo-destaque">Look</span></span>
                </a>
            </div>
            <nav class="main-nav nav-simples">
                <a href="index.html">Voltar para a Loja</a>
            </nav>
        </div>
    </header>

    <main class="carrinho-main">
        <header class="header-carrinho">
            <h2>Meu Carrinho</h2>
            <p>Confira suas peças selecionadas antes de finalizar.</p>
        </header>

        <div id="lista-carrinho"></div>

        <div class="resumo-pagamento">
            <h3>Total do Pedido</h3>
            <div class="total-wrapper">
                <span id="total-carrinho">0,00</span>
            </div>
            <button class="btn-cadastrar btn-finalizar-compra">FINALIZAR COMPRA</button>
            <p class="parcelamento-info">Parcelamento em até 6x sem juros no cartão.</p>
        </div>
    </main>

    <script src="carrinho_script.js"></script>
</body>
</html>
