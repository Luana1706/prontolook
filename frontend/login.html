<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | Pronto Look</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="cadastro-wrapper">
        <div class="container-cadastro">
            <header class="header-form">
                <a href="index.html" class="logo-link">
                    <h2 class="logo-texto">Pronto <span class="logo-destaque">Look</span></h2>
                </a>
                <h3>Bem-vinda de volta</h3>
                <p>Acesse sua conta para conferir as novidades.</p>
            </header>

            <form id="formLogin">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-cadastrar">ENTRAR</button>

                <div class="login-extras">
                    <a href="recuperar.html" class="link-esqueci">Esqueceu sua senha?</a>
                    <div class="divisor-ou"><span>ou</span></div>
                    <button type="button" onclick="verificarAdmin()" class="btn-admin-login">
                        <i class="fas fa-lock"></i> Acesso Administrador
                    </button>
                </div>
            </form>

            <p id="mensagem"></p>

            <footer class="footer-form">
                <p>Primeira vez aqui? <a href="cadastro.html">Criar uma conta</a></p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
