<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pronto Look</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="cadastro-wrapper">
        <div class="container-cadastro">
            <header class="header-form">
                <h2 class="logo-texto">Pronto <span class="logo-destaque">Look</span></h2>
                <h3>Entrar</h3>
                <p>Acesse sua conta para conferir as novidades.</p>
            </header>

            <form id="formLogin">
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="Seu e-mail" required>
                </div>
                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn-cadastrar">ENTRAR</button>
                <div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">
                    <a href="recuperar.html" style="font-size: 13px; color: #888; text-decoration: none;">Esqueceu sua senha?</a>
                    <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                    <button type="button" onclick="verificarAdmin()" style="background: none; border: 1px solid #ccc; padding: 10px; border-radius: 12px; font-size: 12px; color: #666; cursor: pointer; font-weight: 600;">
                        <i class="fas fa-lock"></i> ACESSO RESTRITO
                    </button>
                </div>
            </form>

            <p id="mensagem"></p>
            
            <footer class="footer-form">
                <p>Ainda não tem conta? <a href="cadastro.html">Criar uma aqui</a></p>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
