<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Pronto Look</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="admin-body">
    <div class="admin-container">
        <div class="admin-card">
            <header class="admin-header">
                <h2>Painel Administrativo</h2>
                <p>Gerencie sua vitrine e estoque</p>
                <a href="index.html" class="admin-voltar"><i class="fas fa-arrow-left"></i> Voltar à Loja</a>
            </header>

            <div class="admin-stats" id="admin-stats">
                <div class="stat-card">
                    <i class="fas fa-box-open"></i>
                    <h4>Produtos</h4>
                    <span id="stat-produtos">—</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h4>Estoque Baixo</h4>
                    <span id="stat-baixo">—</span>
                </div>
                <div class="stat-card">
                    <i class="fas fa-times-circle"></i>
                    <h4>Esgotados</h4>
                    <span id="stat-esgotados">—</span>
                </div>
            </div>

            <form id="formProduto" class="form-admin">
                <div class="input-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="admin-nome" placeholder="Ex: Vestido Floral Midi" required>
                </div>
                <div class="admin-grid-2">
                    <div class="input-group">
                        <label>Preço (R$)</label>
                        <input type="number" step="0.01" id="admin-preco" placeholder="0.00" required>
                    </div>
                    <div class="input-group">
                        <label>Categoria</label>
                        <select id="admin-categoria" class="admin-select">
                            <option value="vestidos">Vestidos</option>
                            <option value="blusas">Blusas</option>
                            <option value="conjuntos">Conjuntos</option>
                            <option value="acessorios">Acessórios</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Descrição</label>
                    <textarea id="admin-descricao" class="admin-textarea" placeholder="Descreva o produto..."></textarea>
                </div>
                <div class="admin-grid-2">
                    <div class="input-group">
                        <label>Imagem do Produto</label>
                        <input type="file" id="admin-imagem" accept="image/*">
                        <p class="admin-hint">JPG, PNG — Máx 50MB</p>
                    </div>
                    <div class="input-group-checkbox" style="margin-top: 35px;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="admin-novidade"> Marcar como Novidade
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Selecione os Tamanhos e Quantidades</label>
                    <div class="admin-tamanhos-grid">
                        <label><input type="checkbox" name="tamanho" value="PP" onchange="gerarInputsEstoque()"> PP</label>
                        <label><input type="checkbox" name="tamanho" value="P" onchange="gerarInputsEstoque()"> P</label>
                        <label><input type="checkbox" name="tamanho" value="M" onchange="gerarInputsEstoque()"> M</label>
                        <label><input type="checkbox" name="tamanho" value="G" onchange="gerarInputsEstoque()"> G</label>
                        <label><input type="checkbox" name="tamanho" value="GG" onchange="gerarInputsEstoque()"> GG</label>
                        <label><input type="checkbox" name="tamanho" value="XG" onchange="gerarInputsEstoque()"> XG</label>
                        <label><input type="checkbox" name="tamanho" value="Plus Size" onchange="gerarInputsEstoque()"> Plus Size</label>
                    </div>
                </div>

                <div id="estoque-detalhado-container" class="input-group" style="display:none; background: #fdf2f6; padding: 20px; border-radius: 12px; border: 1px dashed var(--rosa-principal);">
                    <label style="color: var(--rosa-principal);">Defina as Quantidades:</label>
                    <div id="grid-estoque-inputs" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 10px;">
                        <!-- Gerado via JS -->
                    </div>
                </div>

                <button type="submit" class="btn-cadastrar btn-rosa">
                    <i class="fas fa-plus"></i> &nbsp; CADASTRAR PRODUTO
                </button>
            </form>
            <div id="admin-msg" class="admin-mensagem"></div>

            <h3 class="admin-secao-titulo">Gerenciar Produtos</h3>
            <div class="admin-tabela-container">
                <table class="admin-tabela">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Categoria</th>
                            <th>Preço</th>
                            <th>Estoque Total</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-produtos-admin">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Editar Produto -->
    <div id="modalEdit" class="modal-admin">
        <div class="modal-content">
            <span class="modal-close" onclick="fecharModal()">&times;</span>
            <h3 class="admin-secao-titulo">Editar Produto</h3>
            <form id="formEdit" class="form-admin">
                <input type="hidden" id="edit-id">
                <div class="input-group">
                    <label>Nome do Produto</label>
                    <input type="text" id="edit-nome" required>
                </div>
                <div class="admin-grid-2">
                    <div class="input-group">
                        <label>Preço (R$)</label>
                        <input type="number" step="0.01" id="edit-preco" required>
                    </div>
                    <div class="input-group">
                        <label>Categoria</label>
                        <select id="edit-categoria" class="admin-select">
                            <option value="vestidos">Vestidos</option>
                            <option value="blusas">Blusas</option>
                            <option value="conjuntos">Conjuntos</option>
                            <option value="acessorios">Acessórios</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Descrição</label>
                    <textarea id="edit-descricao" class="admin-textarea"></textarea>
                </div>
                <div class="admin-grid-2">
                    <div class="input-group">
                        <label>Nova Imagem (Opcional)</label>
                        <input type="file" id="edit-imagem" accept="image/*">
                    </div>
                    <div class="input-group-checkbox" style="margin-top: 30px;">
                        <label class="checkbox-label">
                            <input type="checkbox" id="edit-novidade"> Novidade
                        </label>
                    </div>
                </div>
                <div class="input-group">
                    <label>Tamanhos</label>
                    <div class="admin-tamanhos-grid">
                        <label><input type="checkbox" name="edit-tamanho" value="PP" onchange="gerarInputsEstoqueEdit()"> PP</label>
                        <label><input type="checkbox" name="edit-tamanho" value="P" onchange="gerarInputsEstoqueEdit()"> P</label>
                        <label><input type="checkbox" name="edit-tamanho" value="M" onchange="gerarInputsEstoqueEdit()"> M</label>
                        <label><input type="checkbox" name="edit-tamanho" value="G" onchange="gerarInputsEstoqueEdit()"> G</label>
                        <label><input type="checkbox" name="edit-tamanho" value="GG" onchange="gerarInputsEstoqueEdit()"> GG</label>
                        <label><input type="checkbox" name="edit-tamanho" value="XG" onchange="gerarInputsEstoqueEdit()"> XG</label>
                        <label><input type="checkbox" name="edit-tamanho" value="Plus Size" onchange="gerarInputsEstoqueEdit()"> Plus Size</label>
                    </div>
                </div>
                <div id="edit-estoque-detalhado-container" class="input-group" style="display:none; background: #f0fdf4; padding: 20px; border-radius: 12px; border: 1px dashed #16a34a;">
                    <label style="color: #16a34a;">Ajustar Quantidades:</label>
                    <div id="edit-grid-estoque-inputs" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; margin-top: 10px;">
                        <!-- Gerado via JS -->
                    </div>
                </div>
                <button type="submit" class="btn-cadastrar btn-rosa">SALVAR ALTERAÇÕES</button>
            </form>
        </div>
    </div>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado'));
        const token = localStorage.getItem('token');
        let produtosGlobais = [];

        if (!usuarioLogado || !token || usuarioLogado.role !== 'admin') {
            window.location.href = "admin_login.html";
        }

        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : '';

        // Dinâmica de Estoque por Tamanho
        function gerarInputsEstoque() {
            const checkboxes = document.querySelectorAll('input[name="tamanho"]:checked');
            const container = document.getElementById('estoque-detalhado-container');
            const grid = document.getElementById('grid-estoque-inputs');
            grid.innerHTML = "";
            if (checkboxes.length === 0) { container.style.display = "none"; return; }
            container.style.display = "block";
            checkboxes.forEach(cb => {
                const div = document.createElement('div');
                div.innerHTML = `<span style="font-size: 11px; font-weight: 700;">Qtd ${cb.value}:</span>
                                 <input type="number" class="input-estoque-tam" data-tam="${cb.value}" value="0" min="0" style="width:100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd;">`;
                grid.appendChild(div);
            });
        }

        function gerarInputsEstoqueEdit(estoqueExistente = null) {
            const checkboxes = document.querySelectorAll('input[name="edit-tamanho"]:checked');
            const container = document.getElementById('edit-estoque-detalhado-container');
            const grid = document.getElementById('edit-grid-estoque-inputs');
            
            // Se estoqueExistente for nulo, tenta pegar os valores atuais dos inputs antes de limpar
            const valoresAtuais = {};
            document.querySelectorAll('.input-edit-estoque-tam').forEach(inp => {
                valoresAtuais[inp.dataset.tam] = inp.value;
            });

            grid.innerHTML = "";
            if (checkboxes.length === 0) { container.style.display = "none"; return; }
            container.style.display = "block";
            
            checkboxes.forEach(cb => {
                let qtd = 0;
                if (estoqueExistente) qtd = estoqueExistente[cb.value] || 0;
                else qtd = valoresAtuais[cb.value] || 0;

                const div = document.createElement('div');
                div.innerHTML = `<span style="font-size: 11px; font-weight: 700;">Qtd ${cb.value}:</span>
                                 <input type="number" class="input-edit-estoque-tam" data-tam="${cb.value}" value="${qtd}" min="0" style="width:100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd;">`;
                grid.appendChild(div);
            });
        }

        // Carregar Dados
        async function carregarDados() {
            try {
                const res = await fetch(`${API_URL}/produtos`);
                produtosGlobais = await res.json();
                document.getElementById('stat-produtos').textContent = produtosGlobais.length;
                document.getElementById('stat-baixo').textContent = produtosGlobais.filter(p => p.estoque > 0 && p.estoque <= 5).length;
                document.getElementById('stat-esgotados').textContent = produtosGlobais.filter(p => p.estoque <= 0).length;

                const lista = document.getElementById('lista-produtos-admin');
                lista.innerHTML = "";
                produtosGlobais.forEach(p => {
                    const statusEstoque = p.estoque <= 0 ? 'estoque-esgotado' : (p.estoque <= 5 ? 'estoque-baixo' : 'estoque-normal');
                    const labelEstoque = p.estoque <= 0 ? 'Esgotado' : (p.estoque <= 5 ? 'Baixo' : 'Normal');
                    
                    let rawImg = p.imagem_url ? p.imagem_url.trim() : '';
                    let imgPath = rawImg.startsWith('http') ? rawImg : `assets/${rawImg || 'placeholder.png'}`;

                    // Montar texto do estoque por tamanho
                    const estoqueD = p.estoque_por_tamanho || {};
                    const breakdown = Object.entries(estoqueD)
                        .map(([tam, qtd]) => `<span class="tamanho-tag" style="font-size: 10px;">${tam}: <b>${qtd}</b></span>`)
                        .join(' ');

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>
                            <div style="display: flex; align-items: center; gap: 12px;">
                                <img src="${imgPath}" class="admin-prod-img">
                                <div>
                                    <div class="admin-prod-nome">${p.nome}</div>
                                    <div class="admin-prod-info">ID: ${p.id}</div>
                                </div>
                            </div>
                        </td>
                        <td>${p.categoria}</td>
                        <td>R$ ${Number(p.preco).toFixed(2)}</td>
                        <td>
                            <div class="badge-estoque ${statusEstoque}" style="margin-bottom: 5px; display: inline-block;">Total: ${p.estoque}</div>
                            <div style="display: flex; flex-wrap: wrap; gap: 4px;">${breakdown}</div>
                        </td>
                        <td>
                            <div class="admin-acoes">
                                <button class="btn-acao btn-edit" onclick="abrirModal(${p.id})" title="Editar Produto e Quantidades"><i class="fas fa-edit"></i></button>
                                <button class="btn-acao btn-del" onclick="excluirProduto(${p.id})" title="Excluir"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    `;
                    lista.appendChild(row);
                });
            } catch (e) { console.error(e); }
        }
        carregarDados();

        // Submit Cadastro
        document.getElementById('formProduto').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const msgEl = document.getElementById('admin-msg');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> CADASTRANDO...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('nome', document.getElementById('admin-nome').value);
            formData.append('preco', document.getElementById('admin-preco').value);
            formData.append('categoria', document.getElementById('admin-categoria').value);
            formData.append('descricao', document.getElementById('admin-descricao').value);
            formData.append('eh_novidade', document.getElementById('admin-novidade').checked);

            const tamanhos = Array.from(document.querySelectorAll('input[name="tamanho"]:checked')).map(cb => cb.value).join(',');
            formData.append('tamanhos', tamanhos);

            const estoqueDetalhado = {};
            document.querySelectorAll('.input-estoque-tam').forEach(inp => {
                estoqueDetalhado[inp.dataset.tam] = parseInt(inp.value) || 0;
            });
            formData.append('estoque_por_tamanho', JSON.stringify(estoqueDetalhado));

            const file = document.getElementById('admin-imagem').files[0];
            if (file) formData.append('imagem', file);

            try {
                const res = await fetch(`${API_URL}/produtos/adicionar`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (res.ok) {
                    msgEl.innerText = "Cadastrado!";
                    msgEl.style.color = "#27ae60";
                    e.target.reset();
                    document.getElementById('estoque-detalhado-container').style.display = 'none';
                    carregarDados();
                } else {
                    const d = await res.json().catch(() => ({ mensagem: "Erro desconhecido." }));
                    if (res.status === 403) {
                        msgEl.innerText = "Erro 403: Acesso negado. Tente sair e entrar novamente no painel.";
                    } else {
                        msgEl.innerText = d.mensagem || "Erro ao cadastrar.";
                    }
                    msgEl.style.color = "#e74c3c";
                }
            } catch (err) {
                console.error(err);
                msgEl.innerText = "Erro de conexão com o servidor.";
                msgEl.style.color = "#e74c3c";
            } finally { btn.innerHTML = '<i class="fas fa-plus"></i> CADASTRAR PRODUTO'; btn.disabled = false; }
        });

        // Ações
        async function excluirProduto(id) {
            if (!confirm("Excluir produto?")) return;
            try {
                const res = await fetch(`${API_URL}/produtos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) carregarDados();
            } catch (e) { console.error(e); }
        }

        function abrirModal(id) {
            const p = produtosGlobais.find(prod => prod.id === id);
            if (!p) return;
            document.getElementById('edit-id').value = p.id;
            document.getElementById('edit-nome').value = p.nome;
            document.getElementById('edit-preco').value = p.preco;
            document.getElementById('edit-categoria').value = p.categoria;
            document.getElementById('edit-descricao').value = p.descricao || '';
            document.getElementById('edit-novidade').checked = p.eh_novidade;
            const checkboxes = document.querySelectorAll('input[name="edit-tamanho"]');
            const tamanhosP = (p.tamanhos || "").split(',');
            checkboxes.forEach(cb => cb.checked = tamanhosP.includes(cb.value));
            gerarInputsEstoqueEdit(p.estoque_por_tamanho || {});
            document.getElementById('modalEdit').style.display = 'flex';
        }

        function fecharModal() { document.getElementById('modalEdit').style.display = 'none'; }

        document.getElementById('formEdit').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const btn = e.target.querySelector('button');
            btn.innerText = "SALVANDO...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('nome', document.getElementById('edit-nome').value);
            formData.append('preco', document.getElementById('edit-preco').value);
            formData.append('categoria', document.getElementById('edit-categoria').value);
            formData.append('descricao', document.getElementById('edit-descricao').value);
            formData.append('eh_novidade', document.getElementById('edit-novidade').checked);
            
            const tamanhos = Array.from(document.querySelectorAll('input[name="edit-tamanho"]:checked')).map(cb => cb.value).join(',');
            formData.append('tamanhos', tamanhos);

            const estoqueDetalhado = {};
            document.querySelectorAll('.input-edit-estoque-tam').forEach(inp => {
                estoqueDetalhado[inp.dataset.tam] = parseInt(inp.value) || 0;
            });
            formData.append('estoque_por_tamanho', JSON.stringify(estoqueDetalhado));

            const file = document.getElementById('edit-imagem').files[0];
            if (file) formData.append('imagem', file);

            try {
                const res = await fetch(`${API_URL}/produtos/${id}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                if (res.ok) { fecharModal(); carregarDados(); }
            } catch (e) { console.error(e); }
            finally { btn.innerText = "SALVAR ALTERAÇÕES"; btn.disabled = false; }
        });
    </script>
</body>
</html>
